<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenida - Pokédex</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header-placeholder"></div>
    
    <main class="main-content">
        <div class="welcome-container">
            <h2>¡Bienvenido, <span id="userName"></span>!</h2>
            <p>Explora los 151 Pokémon originales</p>
            
            <div class="pokedex-container">
                <div class="pokemon-list-container">
                    <h3>Lista de Pokémon</h3>
                    <div class="filters-container">
                        <input type="text" id="filter-name" placeholder="Buscar por nombre..." oninput="filtrarPokemon()">
                        <input type="number" id="filter-id" placeholder="Buscar por ID..." min="1" max="151" oninput="filtrarPokemon()">
                        <select id="filter-type" onchange="filtrarPokemon()">
                            <option value="">Todos los tipos</option>
                        </select>
                    </div>
                    <div id="pokemon-list" class="pokemon-list">
                        <p>Cargando lista...</p>
                    </div>
                </div>
                
                <div class="pokemon-detail-container">
                    <h3>Detalles del Pokémon</h3>
                    <div id="pokemon-detail" class="pokemon-detail">
                        <p>Selecciona un Pokémon de la lista</p>
                    </div>
                </div>
            </div>

            <section class="battle-section">
                <h3>Batalla Pokémon</h3>
                <div class="battle-controls">
                    <div class="battle-picker">
                        <label for="battle-pokemon-1">Pokémon 1</label>
                        <select id="battle-pokemon-1"></select>
                    </div>
                    <div class="battle-picker">
                        <label for="battle-pokemon-2">Pokémon 2</label>
                        <select id="battle-pokemon-2"></select>
                    </div>
                    <button id="start-battle-btn" class="battle-btn" onclick="iniciarBatalla()">Iniciar batalla</button>
                    <button id="next-turn-btn" class="battle-btn" onclick="ejecutarTurno()" disabled>Siguiente turno</button>
                </div>
                <div class="battle-arena">
                    <div id="battle-status" class="battle-status">
                        <p>Selecciona dos Pokémon para empezar la batalla.</p>
                    </div>
                    <div id="battle-log" class="battle-log">
                        <p>El registro de la pelea aparecerá aquí.</p>
                    </div>
                    <div id="battle-winner" class="battle-winner"></div>
                </div>
            </section>
            
            <button onclick="cerrarSesion()" class="logout-btn">Cerrar Sesión</button>
        </div>
    </main>
    
    <div id="footer-placeholder"></div>

    <script src="auth.js"></script>
    <script>
        const session = getCurrentSession();
        if (!session) {
            window.location.href = 'login.html';
        } else {
            document.getElementById('userName').textContent = session.nombre;
        }

        function cerrarSesion() {
            if (confirm('¿Estás seguro de que deseas cerrar sesión?')) {
                logoutUser();
                window.location.href = 'login.html';
            }
        }

        fetch('header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
            });

        fetch('footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
            });

        let allPokemon = [];
        const tipos = new Set();
        let battleState = null;

        async function cargarListaPokemon() {
            const listContainer = document.getElementById('pokemon-list');
            listContainer.innerHTML = '<p>Cargando lista...</p>';
            allPokemon = [];
            tipos.clear();
            
            for (let i = 1; i <= 151; i++) {
                const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${i}`);
                const pokemon = await response.json();
                allPokemon.push(pokemon);
                pokemon.types.forEach(t => tipos.add(t.type.name));
            }
            
            const selectTipo = document.getElementById('filter-type');
            selectTipo.innerHTML = '<option value="">Todos los tipos</option>';
            tipos.forEach(tipo => {
                const option = document.createElement('option');
                option.value = tipo;
                option.textContent = tipo.charAt(0).toUpperCase() + tipo.slice(1);
                selectTipo.appendChild(option);
            });
            
            mostrarListaPokemon(allPokemon);
            cargarSelectoresBatalla();
        }

        function capitalizar(texto) {
            return texto.charAt(0).toUpperCase() + texto.slice(1);
        }

        function cargarSelectoresBatalla() {
            const select1 = document.getElementById('battle-pokemon-1');
            const select2 = document.getElementById('battle-pokemon-2');

            select1.innerHTML = '';
            select2.innerHTML = '';

            allPokemon.forEach(pokemon => {
                const option1 = document.createElement('option');
                option1.value = pokemon.id;
                option1.textContent = `#${pokemon.id} ${capitalizar(pokemon.name)}`;

                const option2 = option1.cloneNode(true);

                select1.appendChild(option1);
                select2.appendChild(option2);
            });

            select1.value = '1';
            select2.value = '4';
        }

        function mostrarListaPokemon(pokemonArray) {
            const listContainer = document.getElementById('pokemon-list');
            listContainer.innerHTML = '';
            
            if (pokemonArray.length === 0) {
                listContainer.innerHTML = '<p>No se encontraron Pokémon</p>';
                return;
            }
            
            pokemonArray.forEach(pokemon => {
                const item = document.createElement('div');
                item.className = 'pokemon-item';
                item.setAttribute('data-id', pokemon.id);
                item.innerHTML = `<span>#${pokemon.id}</span> ${capitalizar(pokemon.name)}`;
                item.onclick = () => mostrarDetalle(pokemon.id);
                listContainer.appendChild(item);
            });
        }

        function filtrarPokemon() {
            const nombre = document.getElementById('filter-name').value.toLowerCase();
            const id = document.getElementById('filter-id').value;
            const tipo = document.getElementById('filter-type').value;
            
            let filtrados = allPokemon;
            
            if (nombre) {
                filtrados = filtrados.filter(p => p.name.toLowerCase().includes(nombre));
            }
            
            if (id) {
                filtrados = filtrados.filter(p => p.id === parseInt(id));
            }
            
            if (tipo) {
                filtrados = filtrados.filter(p => p.types.some(t => t.type.name === tipo));
            }
            
            mostrarListaPokemon(filtrados);
        }

        async function mostrarDetalle(id) {
            const detailContainer = document.getElementById('pokemon-detail');
            detailContainer.innerHTML = '<p>Cargando...</p>';
            
            const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
            const pokemon = await response.json();
            
            const tipos = pokemon.types.map(t => t.type.name).join(', ');
            const ataques = pokemon.moves.slice(0, 8).map(m => capitalizar(m.move.name)).join(', ');
            
            let statsHTML = '';
            pokemon.stats.forEach(stat => {
                statsHTML += `<div class="stat-row"><span>${capitalizar(stat.stat.name)}:</span><span>${stat.base_stat}</span></div>`;
            });
            
            detailContainer.innerHTML = `
                <img src="${pokemon.sprites.other['official-artwork'].front_default}" alt="${pokemon.name}">
                <h4>${pokemon.name.toUpperCase()}</h4>
                <p class="pokemon-id">#${pokemon.id}</p>
                <div class="detail-section">
                    <p><strong>Tipo:</strong> ${tipos}</p>
                    <p><strong>Altura:</strong> ${pokemon.height / 10} m</p>
                    <p><strong>Peso:</strong> ${pokemon.weight / 10} kg</p>
                </div>
                <div class="detail-section">
                    <p><strong>Estadísticas:</strong></p>
                    <div class="stats-container">${statsHTML}</div>
                </div>
                <div class="detail-section">
                    <p><strong>Ataques:</strong></p>
                    <p class="attacks">${ataques}</p>
                </div>
            `;
            
            document.querySelectorAll('.pokemon-item').forEach(item => item.classList.remove('active'));
            const activeItem = document.querySelector(`.pokemon-item[data-id="${id}"]`);
            if (activeItem) activeItem.classList.add('active');
        }

        function obtenerStat(pokemon, nombre) {
            const stat = pokemon.stats.find(item => item.stat.name === nombre);
            return stat ? stat.base_stat : 50;
        }

        function crearCombatiente(pokemon) {
            return {
                pokemon,
                hp: 100,
                turnos: 0,
                defensaActiva: false
            };
        }

        function renderEstadoBatalla() {
            const status = document.getElementById('battle-status');

            if (!battleState) {
                status.innerHTML = '<p>Selecciona dos Pokémon para empezar la batalla.</p>';
                return;
            }

            status.innerHTML = battleState.fighters.map((fighter, index) => `
                <div class="battle-card">
                    <img src="${fighter.pokemon.sprites.other['official-artwork'].front_default}" alt="${fighter.pokemon.name}">
                    <h4>${fighter.pokemon.name.toUpperCase()}</h4>
                    <p>Vida: ${fighter.hp}%</p>
                    <p>Turnos jugados: ${fighter.turnos}</p>
                    <p>${fighter.defensaActiva ? 'Defensa especial activa' : 'Sin defensa especial'}</p>
                    <p>${battleState.turnoActual === index && !battleState.terminada ? 'Turno actual' : ''}</p>
                </div>
            `).join('');
        }

        function agregarLogBatalla(texto) {
            const log = document.getElementById('battle-log');
            const linea = document.createElement('p');
            linea.textContent = texto;
            log.appendChild(linea);
            log.scrollTop = log.scrollHeight;
        }

        function limpiarLogBatalla() {
            const log = document.getElementById('battle-log');
            log.innerHTML = '';
        }

        function iniciarBatalla() {
            const id1 = parseInt(document.getElementById('battle-pokemon-1').value);
            const id2 = parseInt(document.getElementById('battle-pokemon-2').value);
            const pokemon1 = allPokemon.find(pokemon => pokemon.id === id1);
            const pokemon2 = allPokemon.find(pokemon => pokemon.id === id2);
            const winnerContainer = document.getElementById('battle-winner');

            if (!pokemon1 || !pokemon2) {
                return;
            }

            if (id1 === id2) {
                alert('Elige dos Pokémon diferentes.');
                return;
            }

            battleState = {
                fighters: [crearCombatiente(pokemon1), crearCombatiente(pokemon2)],
                turnoActual: 0,
                numeroTurno: 1,
                terminada: false
            };

            limpiarLogBatalla();
            winnerContainer.innerHTML = '';
            agregarLogBatalla(`Comienza la batalla entre ${capitalizar(pokemon1.name)} y ${capitalizar(pokemon2.name)}.`);
            renderEstadoBatalla();
            document.getElementById('next-turn-btn').disabled = false;
        }

        function elegirAccion(combatiente) {
            const acciones = ['ataque'];

            if (combatiente.turnos >= 2) {
                acciones.push('defensa-especial');
            }

            if (combatiente.turnos >= 3) {
                acciones.push('ataque-especial');
            }

            return acciones[Math.floor(Math.random() * acciones.length)];
        }

        function calcularDanio(atacante, accion) {
            const ataqueBase = obtenerStat(atacante.pokemon, 'attack');
            const ataqueEspecial = obtenerStat(atacante.pokemon, 'special-attack');

            if (accion === 'ataque-especial') {
                return Math.max(14, Math.round(ataqueEspecial / 5) + Math.floor(Math.random() * 10));
            }

            return Math.max(8, Math.round(ataqueBase / 7) + Math.floor(Math.random() * 8));
        }

        function obtenerNombreAtaque(pokemon, indice) {
            if (!pokemon.moves[indice]) {
                return 'Golpe base';
            }

            return capitalizar(pokemon.moves[indice].move.name);
        }

        function finalizarBatalla(ganador) {
            const winnerContainer = document.getElementById('battle-winner');

            battleState.terminada = true;
            winnerContainer.innerHTML = `
                <h4>Ganador</h4>
                <img src="${ganador.pokemon.sprites.other['official-artwork'].front_default}" alt="${ganador.pokemon.name}">
                <p>${ganador.pokemon.name.toUpperCase()}</p>
            `;
            document.getElementById('next-turn-btn').disabled = true;
        }

        function ejecutarTurno() {
            if (!battleState || battleState.terminada) {
                return;
            }

            const atacante = battleState.fighters[battleState.turnoActual];
            const defensor = battleState.fighters[battleState.turnoActual === 0 ? 1 : 0];
            const accion = elegirAccion(atacante);
            const turnoTexto = `Turno ${battleState.numeroTurno}: ${capitalizar(atacante.pokemon.name)}.`;
            const fallo = Math.random() < 0.2;

            agregarLogBatalla(turnoTexto);

            if (accion === 'defensa-especial') {
                atacante.turnos += 1;

                if (fallo) {
                    agregarLogBatalla(`${capitalizar(atacante.pokemon.name)} intentó usar defensa especial, pero falló.`);
                } else {
                    atacante.defensaActiva = true;
                    agregarLogBatalla(`${capitalizar(atacante.pokemon.name)} activó su defensa especial.`);
                }
            } else {
                atacante.turnos += 1;

                if (fallo) {
                    const nombreAtaqueFallido = accion === 'ataque-especial'
                        ? 'Ataque especial'
                        : obtenerNombreAtaque(atacante.pokemon, atacante.turnos - 1);

                    agregarLogBatalla(`${capitalizar(atacante.pokemon.name)} usó ${nombreAtaqueFallido}, pero falló.`);
                } else {
                    let danio = calcularDanio(atacante, accion);
                    const nombreAtaque = accion === 'ataque-especial'
                        ? 'Ataque especial'
                        : obtenerNombreAtaque(atacante.pokemon, atacante.turnos - 1);

                    if (defensor.defensaActiva) {
                        danio = Math.max(1, Math.round(danio / 2));
                        defensor.defensaActiva = false;
                    }

                    defensor.hp = Math.max(0, defensor.hp - danio);
                    agregarLogBatalla(`${capitalizar(atacante.pokemon.name)} usó ${nombreAtaque} e hizo ${danio}% de daño. A ${capitalizar(defensor.pokemon.name)} le queda ${defensor.hp}% de vida.`);
                }
            }

            renderEstadoBatalla();

            if (defensor.hp <= 0) {
                agregarLogBatalla(`${capitalizar(defensor.pokemon.name)} ya no puede continuar.`);
                finalizarBatalla(atacante);
                renderEstadoBatalla();
                return;
            }

            battleState.turnoActual = battleState.turnoActual === 0 ? 1 : 0;
            battleState.numeroTurno += 1;
            renderEstadoBatalla();
        }

        cargarListaPokemon();
    </script>
</body>
</html>
